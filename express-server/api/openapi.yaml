      summary: Get a booking by id
      x-eov-operation-handler: controllers/DefaultController
    put:
      operationId: bookingsIdPUT
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
        required: true
      responses:
        "200":
          description: Booking updated
      summary: Update a booking
      x-eov-operation-handler: controllers/DefaultController
components:
  schemas:
    User:
      example:
        id: 1
        name: Ana Silva
        email: ana.silva@umaia.pt
        password: "12345"
        role: student
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
      type: object
    UserInput:
      example:
        password: password
        role: role
        name: name
        email: email
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
      required:
      - email
      - name
      - password
      - role
      type: object
    Room:
      example:
        id: 3
        name: A.204
        capacity: 60
        building: A
        description: Laboratorio
      properties:
        id:
          type: integer
        name:
          type: string
        capacity:
          type: integer
        building:
          type: string
        description:
          type: string
      type: object
    RoomInput:
      example:
        name: name
        description: description
        building: building
        capacity: 0
      properties:
        name:
          type: string
        capacity:
          type: integer
        building:
          type: string
        description:
          type: string
      required:
      - building
      - capacity
      - name
      type: object
    Tag:
      example:
        id: 1
        name: Programación
      properties:
        id:
          type: integer
        name:
          type: string
      type: object
    TagInput:
      example:
        name: name
      properties:
        name:
          type: string
      required:
      - name
      type: object
    Event:
      example:
        id: 1
        title: Taller Node.js
        description: Introducción a Node.js
        room_id: 2
        tag_id: 1
        start_datetime: 2025-11-20T09:00:00
        end_datetime: 2025-11-20T11:00:00
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        room_id:
          type: integer
        tag_id:
          type: integer
        start_datetime:
          format: date-time
          type: string
        end_datetime:
          format: date-time
          type: string
      type: object
    EventInput:
      example:
        room_id: 0
        start_datetime: 2000-01-23T04:56:07.000+00:00
        end_datetime: 2000-01-23T04:56:07.000+00:00
        description: description
        tag_id: 6
        title: title
      properties:
        title:
          type: string
        description:
          type: string
        room_id:
          type: integer
        tag_id:
          type: integer
        start_datetime:
          format: date-time
          type: string
        end_datetime:
          format: date-time
          type: string
      required:
      - end_datetime
      - room_id
      - start_datetime
      - tag_id
      - title
      type: object
    Booking:
      example:
        id: 1
        user_id: 3
        event_id: 1
        created_at: 2025-11-13T12:00:00
      properties:
        id:
          type: integer
        user_id:
          type: integer
        event_id:
          type: integer
        created_at:
          format: date-time
          type: string
      type: object
    BookingInput:
      example:
        event_id: 6
        user_id: 0
      properties:
        user_id:
          type: integer
        event_id:
          type: integer
      required:
      - event_id
      - user_id
      type: object
