      operationId: roomsIdDELETE
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          description: Room deleted
      summary: Delete a room
      x-eov-operation-handler: controllers/DefaultController
    get:
      operationId: roomsIdGET
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
          description: Room found
        "404":
          description: Room not found
      summary: Get a room by id
      x-eov-operation-handler: controllers/DefaultController
    put:
      operationId: roomsIdPUT
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInput"
        required: true
      responses:
        "200":
          description: Room updated
      summary: Update a room
      x-eov-operation-handler: controllers/DefaultController
  /tags:
    get:
      operationId: tagsGET
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Tag"
                type: array
          description: List of tags
      summary: List all tags
      x-eov-operation-handler: controllers/DefaultController
    post:
      operationId: tagsPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagInput"
        required: true
      responses:
        "201":
          description: Tag created
      summary: Create a new tag
      x-eov-operation-handler: controllers/DefaultController
  /tags/{id}:
    delete:
      operationId: tagsIdDELETE
      parameters:
      - explode: false
