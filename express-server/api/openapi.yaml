openapi: 3.0.3
info:
  description: "API para gestionar usuarios, salas, eventos, reservas y etiquetas\
    \ del campus MAIA."
  title: Maia Campus Event API
  version: 1.0.0
servers:
- url: http://localhost:8080
paths:
  /users:
    get:
      operationId: usersGET
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/User"
                type: array
          description: List of users
      summary: List all users
      x-eov-operation-handler: controllers/DefaultController
    post:
      operationId: usersPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: User created
      summary: Create a new user
      x-eov-operation-handler: controllers/DefaultController
  /users/{id}:
    delete:
      operationId: usersIdDELETE
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          description: User deleted
      summary: Delete a user
      x-eov-operation-handler: controllers/DefaultController
    get:
      operationId: usersIdGET
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: User found
        "404":
          description: User not found
      summary: Get a user by id
      x-eov-operation-handler: controllers/DefaultController
    put:
      operationId: usersIdPUT
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
        required: true
      responses:
        "200":
          description: User updated
      summary: Update a user
      x-eov-operation-handler: controllers/DefaultController
  /rooms:
    get:
      operationId: roomsGET
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Room"
